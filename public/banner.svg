<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200" role="img" aria-label="Task Manager — workshop-kiro">
  <defs>
    <linearGradient id="g-bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#111219"/>
    </linearGradient>
    <linearGradient id="g-accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#9046FF"/>
    </linearGradient>
    <linearGradient id="g-hero" x1="0" y1="0" x2="0.6" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1b26" stop-opacity="0"/>
    </linearGradient>
    <!-- Clip path for Kiro mascot rounded square -->
    <clipPath id="kiro-clip-banner">
      <path d="M18.8 0H5.2A5.2 5.2 0 000 5.2v13.6A5.2 5.2 0 005.2 24h13.6a5.2 5.2 0 005.2-5.2V5.2A5.2 5.2 0 0018.8 0z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="820" height="200" rx="16" fill="url(#g-bg)"/>
  <!-- Hero gradient overlay -->
  <rect width="820" height="200" rx="16" fill="url(#g-hero)"/>
  <!-- Border -->
  <rect width="820" height="200" rx="16" fill="none" stroke="rgba(124,92,252,0.22)" stroke-width="1"/>
  <!-- Subtle glow orbs -->
  <ellipse cx="130" cy="100" rx="100" ry="70" fill="#7c5cfc" opacity="0.05"/>
  <ellipse cx="750" cy="110" rx="120" ry="90" fill="#9046FF" opacity="0.04"/>

  <!-- ── Kiro mascot ─────────────────────────────────────────────────────── -->
  <!-- viewBox 0 0 24 24 → scale ×5.5, positioned at (32, 28) -->
  <g transform="translate(32 28) scale(5.5)">
    <!-- Purple rounded square background -->
    <path d="M18.8 0H5.2A5.2 5.2 0 000 5.2v13.6A5.2 5.2 0 005.2 24h13.6a5.2 5.2 0 005.2-5.2V5.2A5.2 5.2 0 0018.8 0z" fill="#9046FF"/>

    <!-- Clipped layers -->
    <g clip-path="url(#kiro-clip-banner)">
      <!-- Notebook — behind ghost -->
      <g transform="translate(17.6 11.5) rotate(20)">
        <rect x="-5.3" y="-5.7" width="11" height="13" rx="1" fill="#000" opacity="0.2"/>
        <rect x="-5.5" y="-6" width="11" height="13" rx="1" fill="#ffffff" stroke="#5733e0" stroke-width="0.4"/>
        <circle cx="-3.6" cy="-6" r="0.45" fill="#1a1b26" opacity="0.55"/>
        <circle cx="-1.8" cy="-6" r="0.45" fill="#1a1b26" opacity="0.55"/>
        <circle cx="0" cy="-6" r="0.45" fill="#1a1b26" opacity="0.55"/>
        <circle cx="1.8" cy="-6" r="0.45" fill="#1a1b26" opacity="0.55"/>
        <circle cx="3.6" cy="-6" r="0.45" fill="#1a1b26" opacity="0.55"/>
        <path d="M-4 -3.5 l0.7 0.7 l1.3 -1.5" fill="none" stroke="#10b981" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="-1.6" y1="-3.5" x2="3.2" y2="-3.5" stroke="#7c5cfc" stroke-width="0.5" opacity="0.5"/>
        <line x1="-4" y1="-0.7" x2="-0.6" y2="-0.7" stroke="#7c5cfc" stroke-width="0.55" opacity="0.85"/>
        <line x1="-4" y1="2" x2="3" y2="2" stroke="#7c5cfc" stroke-width="0.5" opacity="0.4"/>
        <line x1="-4" y1="4.5" x2="2.2" y2="4.5" stroke="#7c5cfc" stroke-width="0.5" opacity="0.3"/>
      </g>

      <!-- Ghost silhouette — shifted −3.3 X -->
      <g transform="translate(-3.3 0)">
        <path d="M7.97 16.376c-1.644 3.642 1.86 4.556 4.443 2.424.76 2.39 3.608.607 4.631-1.247 2.251-4.084 1.342-8.249 1.108-9.108-1.6-5.859-9.6-5.869-10.976.03-.323 1.033-.328 2.206-.507 3.423-.09.617-.16 1.009-.393 1.655-.139.373-.323.7-.62 1.257-.458.865-.264 2.53 2.101 1.665l.224-.1h-.01l-.001.001z" fill="#ffffff"/>
        <path d="M12.722 10.985c-.656 0-.755-.785-.755-1.252 0-.423.074-.756.218-.97a.61.61 0 01.537-.283c.229 0 .428.095.567.289.159.218.243.55.243.964 0 .785-.303 1.252-.805 1.252h-.005z" fill="#000000"/>
        <path d="M15.425 10.985c-.656 0-.755-.785-.755-1.252 0-.423.074-.756.219-.97a.61.61 0 01.536-.283c.229 0 .428.095.567.289.159.218.243.55.243.964 0 .785-.303 1.252-.805 1.252h-.005z" fill="#000000"/>
      </g>

      <!-- Pencil + hand -->
      <g transform="translate(6.3 -2.8)">
        <g transform="translate(8.3 12.31) rotate(-35) scale(0.72)">
          <rect x="-1.5" y="-8.2" width="3" height="14.8" rx="0.7" fill="#000" opacity="0.18"/>
          <rect x="-1.5" y="-8" width="3" height="2" rx="0.7" fill="#ef4444"/>
          <rect x="-1.5" y="-6" width="3" height="1" fill="#9ca3af"/>
          <rect x="-1.5" y="-5" width="3" height="9" fill="#fbbf24"/>
          <rect x="-1.5" y="-5" width="1" height="9" fill="#fde68a" opacity="0.7"/>
          <polygon points="-1.5,4 1.5,4 0,6.5" fill="#fde68a"/>
          <polygon points="-0.6,5.4 0.6,5.4 0,6.5" fill="#1a1b26"/>
        </g>
        <circle cx="8.92" cy="13.19" r="1.45" fill="#ffffff"/>
      </g>

      <!-- Sparkles -->
      <path d="M4.5 5 L5 6.4 L6.4 6.9 L5 7.4 L4.5 8.8 L4 7.4 L2.6 6.9 L4 6.4 Z" fill="#b4a5fd" opacity="0.9"/>
      <circle cx="20" cy="5.2" r="0.6" fill="#b4a5fd" opacity="0.8"/>
      <circle cx="20.8" cy="6.8" r="0.4" fill="#b4a5fd" opacity="0.55"/>
    </g>
  </g>

  <!-- ── Text content ───────────────────────────────────────────────────── -->
  <text x="210" y="70" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-0.8">Task Manager</text>
  <!-- Accent underline -->
  <rect x="210" y="78" width="140" height="3" rx="1.5" fill="url(#g-accent)"/>
  <!-- Subtitle -->
  <text x="210" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#9ca3af">Agente IA + Kanban en español</text>
  <!-- Tech line -->
  <text x="210" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4b5563">Bun · Elysia · React 18 · SQLite · TypeScript strict · Tailwind CSS</text>

  <!-- ── Stats pills ─────────────────────────────────────────────────────── -->
  <!-- 427 tests pill -->
  <rect x="210" y="145" width="92" height="26" rx="7" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <circle cx="225" cy="158" r="4" fill="#10b981"/>
  <!-- checkmark inside circle -->
  <path d="M222.8 158 l1.5 1.5 l3-3" stroke="#fff" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="234" y="162.5" font-family="system-ui,sans-serif" font-size="11" fill="#10b981" font-weight="600">427 tests</text>

  <!-- 13 features pill -->
  <rect x="312" y="145" width="102" height="26" rx="7" fill="rgba(124,92,252,0.12)" stroke="rgba(124,92,252,0.3)" stroke-width="1"/>
  <circle cx="327" cy="158" r="4" fill="#7c5cfc"/>
  <path d="M324.8 158 l1.5 1.5 l3-3" stroke="#fff" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="336" y="162.5" font-family="system-ui,sans-serif" font-size="11" fill="#7c5cfc" font-weight="600">13 features</text>

  <!-- Harness SDD pill -->
  <rect x="424" y="145" width="108" height="26" rx="7" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <circle cx="439" cy="158" r="4" fill="#f59e0b"/>
  <text x="423" y="155" font-family="system-ui,sans-serif" font-size="9" fill="#f59e0b" font-weight="700" text-anchor="middle" dominant-baseline="middle">
    <tspan x="439">S</tspan>
  </text>
  <text x="451" y="162.5" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b" font-weight="600">Harness SDD</text>

  <!-- Agent IA pill -->
  <rect x="542" y="145" width="86" height="26" rx="7" fill="rgba(124,92,252,0.08)" stroke="rgba(124,92,252,0.2)" stroke-width="1"/>
  <circle cx="557" cy="158" r="4" fill="#9046FF"/>
  <text x="566" y="162.5" font-family="system-ui,sans-serif" font-size="11" fill="#b4a5fd" font-weight="600">Agente IA</text>
</svg>
