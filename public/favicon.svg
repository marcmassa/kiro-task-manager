  <g clip-path="url(#bg)">
    <!-- Notebook — behind ghost -->
    <g transform="translate(15.9 12.5) rotate(35)">
      <rect x="-5.3" y="-5.7" width="11" height="13" rx="1" fill="#000" opacity="0.2"/>
      <rect x="-5.5" y="-6" width="11" height="13" rx="1" fill="#ffffff" stroke="#5733e0" stroke-width="0.4"/>
      <circle cx="-3.6" cy="-6" r="0.45" fill="#1a1b26" opacity="0.55"/>
